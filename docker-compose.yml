version: '3.9'

services:
  app:
    image: kennethreitz/httpbin
    container_name: xff_app
    networks:
      proxy_net:
        ipv4_address: 172.28.10.10
    ports:
      - "8080:80"

  nginx1:
    image: nginx:1.27-alpine
    container_name: xff_nginx1
    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    networks:
      proxy_net:
        ipv4_address: 172.28.10.11
    depends_on:
      - app

  nginx2:
    image: nginx:1.27-alpine
    container_name: xff_nginx2
    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8082:80"
    networks:
      proxy_net:
        ipv4_address: 172.28.10.12
    depends_on:
      - app

  nginx3:
    image: nginx:1.27-alpine
    container_name: xff_nginx3
    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8083:80"
    networks:
      proxy_net:
        ipv4_address: 172.28.10.13
    depends_on:
      - app

networks:
  proxy_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24